name: Import .solar to Notion
on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to .solar/.json/.txt file in repo, e.g. imports/system.solar'
        required: true
        default: 'imports/system.solar'
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Import to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/import_to_notion.py "${{ github.event.inputs.file_path }}"
